<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Something Special Awaits... ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0d0520 100%);
  color: #fff;
  overflow: hidden;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Animated gradient background */
.bg-gradient {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 30% 20%, rgba(255, 105, 180, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255, 182, 193, 0.1) 0%, transparent 60%);
  animation: gradientFloat 20s ease-in-out infinite;
  z-index: 0;
}

@keyframes gradientFloat {
  0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
  50% { transform: scale(1.2) rotate(5deg); opacity: 0.8; }
}

/* Floating particles */
.particle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: rgba(255, 182, 193, 0.6);
  border-radius: 50%;
  animation: float linear infinite;
  z-index: 1;
}

@keyframes float {
  0% { 
    transform: translateY(100vh) translateX(0) scale(0);
    opacity: 0;
  }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { 
    transform: translateY(-20vh) translateX(var(--tx)) scale(1);
    opacity: 0;
  }
}

/* Main container */
.container {
  position: relative;
  z-index: 10;
  text-align: center;
  max-width: 600px;
  padding: 40px 30px;
}

/* Top badge */
.badge {
  display: inline-block;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 182, 193, 0.3);
  border-radius: 50px;
  padding: 8px 24px;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #ffb6c1;
  margin-bottom: 30px;
  animation: fadeInDown 1s ease;
}

/* Main heading */
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.5rem, 8vw, 5rem);
  font-weight: 300;
  font-style: italic;
  color: #ffd1e3;
  margin-bottom: 20px;
  line-height: 1.2;
  animation: fadeInDown 1s 0.2s ease both;
  text-shadow: 0 0 40px rgba(255, 182, 193, 0.3);
}

/* Subtitle */
.subtitle {
  font-size: 1.1rem;
  color: rgba(255, 209, 227, 0.7);
  font-weight: 300;
  margin-bottom: 60px;
  animation: fadeInDown 1s 0.4s ease both;
  letter-spacing: 1px;
}

/* Countdown container */
.countdown {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 40px;
  animation: fadeInUp 1s 0.6s ease both;
  flex-wrap: wrap;
}

.time-box {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 182, 193, 0.2);
  border-radius: 16px;
  padding: 25px 20px;
  min-width: 100px;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.time-box::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255, 182, 193, 0.1) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.time-box:hover::before {
  opacity: 1;
}

.time-box:hover {
  transform: translateY(-5px);
  border-color: rgba(255, 182, 193, 0.5);
  box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3);
}

.time-number {
  font-size: 3.5rem;
  font-weight: 300;
  color: #ffd1e3;
  display: block;
  line-height: 1;
  margin-bottom: 8px;
  font-family: 'Cormorant Garamond', serif;
}

.time-label {
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255, 182, 193, 0.6);
  font-weight: 400;
}

/* Progress bar */
.progress-container {
  margin-top: 50px;
  animation: fadeInUp 1s 0.8s ease both;
}

.progress-label {
  font-size: 0.85rem;
  color: rgba(255, 209, 227, 0.5);
  margin-bottom: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff69b4 0%, #ff1493 100%);
  border-radius: 10px;
  width: 0%;
  transition: width 1s ease;
  box-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
}

/* Loading message */
.loading-message {
  margin-top: 40px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.3rem;
  color: #ffd1e3;
  opacity: 0;
  animation: fadeInUp 1s 1s ease both;
}

/* Heart decoration */
.heart-decoration {
  font-size: 2rem;
  margin-top: 30px;
  opacity: 0.6;
  animation: heartbeat 2s ease-in-out infinite;
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* Animations */
@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive */
@media (max-width: 600px) {
  .countdown {
    gap: 15px;
  }
  
  .time-box {
    min-width: 80px;
    padding: 20px 15px;
  }
  
  .time-number {
    font-size: 2.5rem;
  }
  
  h1 {
    font-size: 2.5rem;
  }
}

/* Completion message */
.completion-message {
  display: none;
  animation: fadeInScale 0.8s ease;
}

@keyframes fadeInScale {
  from {
    opacity: 0;
    transform: scale(0.8);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.completion-message h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.5rem;
  color: #ffd1e3;
  margin-bottom: 20px;
  font-weight: 300;
  font-style: italic;
}

.completion-message p {
  font-size: 1.1rem;
  color: rgba(255, 209, 227, 0.8);
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="bg-gradient"></div>

<!-- Background Music (Playlist) -->
<audio id="bgMusic" loop></audio>

<!-- Floating particles -->
<script>
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.setProperty('--tx', (Math.random() * 60 - 30) + 'px');
    particle.style.animationDuration = (15 + Math.random() * 15) + 's';
    particle.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(particle);
  }
</script>

<div class="container">
  <div id="countdownView">
    <div class="badge">✨ Something special</div>
    <h1>Almost there...</h1>
    <p class="subtitle">A surprise is waiting for you</p>
    
    <div class="countdown">
      <div class="time-box">
        <span class="time-number" id="days">00</span>
        <span class="time-label">Days</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="hours">00</span>
        <span class="time-label">Hours</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="minutes">00</span>
        <span class="time-label">Minutes</span>
      </div>
      <div class="time-box">
        <span class="time-number" id="seconds">00</span>
        <span class="time-label">Seconds</span>
      </div>
    </div>
    
    <div class="progress-container">
      <div class="progress-label">Loading your surprise</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>
    
    <div class="loading-message">Get ready... 💕</div>
    <div class="heart-decoration">❤️</div>
  </div>

  <div id="completionView" class="completion-message">
    <h2>Time's up! 🎉</h2>
    <p>Redirecting you now...</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 🔧 EASY CUSTOMIZATION SECTION — CHANGE THESE VALUES!
// ═══════════════════════════════════════════════════════════════

// 1️⃣ SET YOUR COUNTDOWN DATE & TIME (24-hour format)
// Currently set to: March 14, 2026 at 12:00 AM (midnight) in Kuwait (GMT+3)
const targetDate = new Date('2026-03-14T00:00:00+03:00');

// If you need to change it:
// Format: 'YYYY-MM-DDTHH:MM:SS+03:00' (the +03:00 is Kuwait timezone)
// Examples:
// '2026-03-14T21:30:00+03:00' → March 14, 2026 at 9:30 PM Kuwait time
// '2026-12-25T12:00:00+03:00' → Dec 25, 2026 at noon Kuwait time

// 2️⃣ SET THE REDIRECT URL (where to go when countdown ends)
const redirectURL = 'https://gumenjoyer.github.io/hina-countdown/image.png';
// Change this to any URL you want!

// ═══════════════════════════════════════════════════════════════
// END OF CUSTOMIZATION SECTION
// ═══════════════════════════════════════════════════════════════

function updateCountdown() {
  const now = new Date().getTime();
  const distance = targetDate - now;
  
  if (distance < 0) {
    // Countdown finished!
    document.getElementById('countdownView').style.display = 'none';
    document.getElementById('completionView').style.display = 'block';
    
    // Redirect after 2 seconds
    setTimeout(() => {
      window.location.href = redirectURL;
    }, 2000);
    
    return;
  }
  
  // Calculate time units
  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);
  
  // Update display
  document.getElementById('days').textContent = String(days).padStart(2, '0');
  document.getElementById('hours').textContent = String(hours).padStart(2, '0');
  document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
  document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
  
  // Update progress bar (based on total countdown duration)
  const totalDuration = targetDate - new Date(Date.now() - (7 * 24 * 60 * 60 * 1000)); // Assume 7 days max
  const elapsed = totalDuration - distance;
  const progress = Math.min((elapsed / totalDuration) * 100, 100);
  document.getElementById('progressBar').style.width = progress + '%';
}

// Update every second
updateCountdown();
setInterval(updateCountdown, 1000);

// ═══════════════════════════════════════════════════════════════
// 🎵 MUSIC PLAYLIST — ADD YOUR SONGS HERE!
// ═══════════════════════════════════════════════════════════════

const playlist = [
  'song1.mp3',
  'song2.mp3',
  'song3.mp3',
  'song4.mp3',
  // Add more songs here! Just copy the line above and change the filename
];

// Music setup
const music = document.getElementById("bgMusic");
music.volume = 0.20; // Soft volume (0.0 to 1.0)
let currentTrack = 0;

// Shuffle the playlist (optional - remove these 3 lines if you want songs in order)
for (let i = playlist.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
}

// Load and play first song
function loadTrack(index) {
  music.src = playlist[index];
  music.load();
}

// Play next song when current one ends
music.addEventListener('ended', function() {
  currentTrack = (currentTrack + 1) % playlist.length; // Loop back to start
  loadTrack(currentTrack);
  music.play();
});

// Start playing
loadTrack(currentTrack);
music.play().catch(e => {
  // If autoplay is blocked, play on first click
  document.body.addEventListener('click', function() {
    music.play();
  }, { once: true });
});

// ═══════════════════════════════════════════════════════════════
// END OF MUSIC SECTION
// ═══════════════════════════════════════════════════════════════
</script>

</body>
</html>
